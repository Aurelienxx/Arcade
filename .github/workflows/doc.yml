name: Auto Documentation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/changelog_auto.md'

permissions:
  contents: write

jobs:
  generate-doc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Javadoc
        run: |
          echo "=== Génération Javadoc ==="
          mkdir -p docs/javadoc
          JAVA_FILES=$(find . -name "*.java" -not -path "./docs/*" | wc -l)
          echo "Fichiers Java trouvés: $JAVA_FILES"
          find . -name "*.java" -not -path "./docs/*" -print0 | xargs -0 javadoc -d docs/javadoc 2>&1 || echo "Javadoc générée avec avertissements"
          echo "Javadoc complétée"
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests pdoc

      - name: Generate Python documentation
        run: |
          echo "=== Génération documentation Python ==="
          PYTHON_FILES=$(find . -name "*.py" -not -path "./docs/*" -not -path "./.git/*" | wc -l)
          echo "Fichiers Python trouvés: $PYTHON_FILES"
          if [ $PYTHON_FILES -gt 0 ]; then
            mkdir -p docs/python
            pdoc -o docs/python scripts/ 2>/dev/null || echo "Attention: Erreur pdoc (module incomplet?)"
            echo "Documentation Python générée"
          else
            echo "Aucun fichier Python trouvé"
          fi

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > ollama.log 2>&1 &
          sleep 5

      - name: Pull model
        run: |
          ollama pull phi3

      - name: Generate AI changelog
        run: |
          echo "=== Génération Changelog IA ==="
          python scripts/generate_ai_doc.py

      - name: Commit documentation
        run: |
          echo "=== Finalisation ==="
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          if ! git diff --cached --quiet; then
            echo "Fichiers modifiés détectés"
            git commit -m "Auto-generated documentation [skip ci]"
            git push
            echo "✅ Documentation poussée avec succès"
          else
            echo "ℹ️  Aucun changement de documentation"
          fi